global:
  scrape_interval: 15s # Intervalo de recogida de métricas

scrape_configs:

  # Conexiones HTTP activas y estado de Nginx
  - job_name: 'nginx'
    metrics_path: /metrics # Ruta por defecto del Nginx Exporter
    static_configs:
      - targets: ['nginx-exporter:9113'] # Nombre del servicio Docker (ver docker-compose.yml)
        labels:
          instance: nginx_stream_server

  # Usuarios conectados, bitrate y uptime del stream RTMP
  - job_name: 'rtmp'
    metrics_path: /metrics
    static_configs:
      - targets: [ 'rtmp-exporter:9114' ]
        labels:
          instance: nginx_stream_server

  # Monitorización del propio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitorización del Node Exporter (métricas del sistema operativo)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100'] # Nombre del servicio Node Exporter
