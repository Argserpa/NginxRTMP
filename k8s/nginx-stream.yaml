apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-recordings
  namespace: streaming
  labels:
    app: nginx-stream
spec:
  accessModes:
    - ReadWriteOnce  # Una sola réplica de nginx-stream escribe las grabaciones
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard  # Por defecto en minikube; descomentar si se usa otro
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-stream
  namespace: streaming
  labels:
    app: nginx-stream
spec:
  replicas: 1  # RTMP no escala horizontalmente sin almacenamiento compartido; se mantiene una réplica
  selector:
    matchLabels:
      app: nginx-stream
  template:
    metadata:
      labels:
        app: nginx-stream
    spec:
      containers:
        - name: nginx-stream
          image: nginx-rtmp-server:latest
          imagePullPolicy: Never  # Imagen local construida en minikube
          ports:
            - name: rtmp
              containerPort: 1935
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            # Volumen persistente para las grabaciones (record_path /recordings)
            - name: recordings
              mountPath: /recordings
            # ----- Opcional: montaje de nginx.conf desde un ConfigMap -----
            # Permite modificar la configuración sin recompilar la imagen.
            # Para activarlo, descomentar el siguiente bloque y crear un ConfigMap
            # con el contenido de nginx.conf.
            # - name: nginx-config
            #   mountPath: /usr/local/nginx/conf/nginx.conf
            #   subPath: nginx.conf
            # - name: tls-certs
            #   mountPath: /usr/local/nginx/certs
            #   readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: nginx-recordings
        # - name: nginx-config
        #   configMap:
        #     name: nginx-config
        # - name: tls-certs
        #   secret:
        #     secretName: nginx-tls  # kubectl create secret tls nginx-tls --cert=... --key=...
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-stream
  namespace: streaming
  labels:
    app: nginx-stream
spec:
  type: LoadBalancer  # Requiere ejecutar `minikube tunnel` en una terminal aparte
  selector:
    app: nginx-stream
  ports:
    - name: rtmp
      port: 1935
      targetPort: 1935
      protocol: TCP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
