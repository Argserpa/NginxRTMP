# Deployment: rtmp-exporter
# Exporter custom (Python/Flask) que parsea el XML de /stat generado por
# nginx-rtmp-module y expone las métricas en formato Prometheus.
# Métricas: clientes por stream, bitrate entrada/salida, bytes totales, uptime.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmp-exporter
  namespace: streaming
  labels:
    app: rtmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rtmp-exporter
  template:
    metadata:
      labels:
        app: rtmp-exporter
    spec:
      containers:
        - name: rtmp-exporter
          image: rtmp-exporter:latest
          imagePullPolicy: Never  # Imagen local construida en minikube
          env:
            # El exportador consulta /stat de Nginx; 'nginx-stream' es el Service de Kubernetes
            - name: NGINX_STAT_URL
              value: "http://nginx-stream:80/stat"
          ports:
            - name: metrics
              containerPort: 9114
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
# Service: rtmp-exporter
# ClusterIP: Prometheus accede internamente a rtmp-exporter:9114.
apiVersion: v1
kind: Service
metadata:
  name: rtmp-exporter
  namespace: streaming
  labels:
    app: rtmp-exporter
spec:
  type: ClusterIP
  selector:
    app: rtmp-exporter
  ports:
    - name: metrics
      port: 9114
      targetPort: 9114
