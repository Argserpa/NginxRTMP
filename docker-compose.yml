services:

  #  Servidor Nginx de streaming 
  nginx-stream-rtpm:
    build:
      dockerfile: ./nginx/Dockerfile  # Dockerfile ubicado en nginx/
    image: nginx-rtmp-server
    container_name: nginx_streaming_server
    ports:
      - "1935:1935"   # RTMP, ingesta desde el codificador
      - "80:80"       # HTTP, reproductor web
      - "443:443"     # HTTPS
    volumes:
      - ./nginx/nginx.conf:/usr/local/nginx/conf/nginx.conf  # Configuración recargable
      - ./certs:/usr/local/nginx/certs                       # Certificados SSL
      - recordings_data:/recordings                          # Grabaciones VOD (.ts por fecha)
    depends_on:
      - recordings-api   # nginx resuelve el upstream del proxy_pass al arrancar
    restart: unless-stopped
    networks:
      - streaming_network
      - monitoring_network   # Red necesaria para que nginx-exporter alcance al servidor

  #  API de metadatos de grabaciones (sirve recordings.html) 
  recordings-api:
    build:
      context: ./recordings-api
      dockerfile: Dockerfile
    image: recordings-api
    container_name: recordings_api
    environment:
      RECORD_DIR: /recordings
    volumes:
      - recordings_data:/recordings:ro   # mismo volumen que nginx; aquí solo lectura
    restart: unless-stopped
    networks:
      - streaming_network   # nginx-stream-rtpm hace proxy_pass a este servicio

  #  Nginx Prometheus Exporter 
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_prometheus_exporter
    ports:
      - "9113:9113"
    environment:
      NGINX_STUB_STATUS_URL: http://nginx-stream-rtpm:80/nginx_status
    depends_on:
      - nginx-stream-rtpm
    restart: unless-stopped
    networks:
      - monitoring_network
      - streaming_network

  #  Exportador RTMP (usuarios conectados, bitrate y uptime del stream) 
  rtmp-exporter:
    build:
      context: ./monitoring/rtmp-exporter
      dockerfile: Dockerfile
    image: rtmp-exporter
    container_name: rtmp_exporter
    ports:
      - "9114:9114"
    environment:
      NGINX_STAT_URL: http://nginx-stream-rtpm:80/stat
      EXPORTER_PORT: "9114"
      SCRAPE_TIMEOUT: "5"
    depends_on:
      - nginx-stream-rtpm
    restart: unless-stopped
    networks:
      - monitoring_network
      - streaming_network

  #  Prometheus 
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle        # Permite recargar la configuración mediante POST /-/reload
    depends_on:
      - nginx-exporter
      - node-exporter
    restart: unless-stopped
    networks:
      - monitoring_network

  #  Grafana 
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_server
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring_network

  #  Exportador Node Exporter (métricas del host) 
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_server
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring_network

#  Redes 
networks:
  streaming_network:
    driver: bridge
  monitoring_network:
    driver: bridge

#  Volúmenes persistentes 
volumes:
  prometheus_data:
  grafana_data:
  recordings_data:   # Grabaciones VOD compartidas entre nginx-stream-rtpm y recordings-api