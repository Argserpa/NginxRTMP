# Usuario y grupo bajo los que se ejecuta Nginx
user  nginx;
worker_processes  auto; # Número de procesos worker; "auto" emplea los núcleos disponibles

error_log  /dev/stderr warn; # Salida de errores hacia stderr para su recogida por Prometheus
pid        /run/nginx.pid; # Ubicación del PID fuera del directorio de logs por defecto


events {
    worker_connections  1024; # Conexiones máximas por proceso worker
}


# Bloque rtmp
# Proporcionado por nginx-rtmp-module. Gestiona la ingestión de streams RTMP
# (protocolo usado por OBS, ffmpeg, etc.) y su conversión a HLS/DASH.
rtmp {
    server {
        listen 1935; # Puerto de ingesta RTMP
        chunk_size 4096;

        # Aplicación de emisión en directo
        application live {
            live on; # Habilita la emisión en directo

            # Grabación de cada emisión para verla después como VOD.
            # nginx-rtmp solo sabe grabar en FLV, así que se graba primero a
            # /tmp/rec (efímero) y, al terminar la emisión, record-done.sh remuxea
            # el FLV a MPEG-TS dentro del volumen persistente /recordings,
            # organizado por fecha: /recordings/AAAA-MM-DD/HH-MM-SS.ts
            record all;                              # Graba audio y vídeo
            record_path /tmp/rec;                    # FLV temporal (se borra tras convertir)
            record_suffix _%Y-%m-%d_%H-%M-%S.flv;    # El nombre lleva la fecha y hora de inicio
            exec_record_done /usr/local/bin/record-done.sh $path; # FLV → TS por fecha

            # HLS (HTTP Live Streaming)
            hls on;
            hls_path /tmp/hls/live; # Directorio de los segmentos HLS
            hls_fragment 3s; # Duración de cada segmento HLS
            hls_playlist_length 12s; # Duración de la playlist HLS
            hls_sync 100ms; # Sincronización entre segmentos
            hls_continuous on;   # Evita reinicios de numeración de segmentos
            hls_cleanup on;      # Elimina segmentos antiguos automáticamente

            # DASH (Dynamic Adaptive Streaming over HTTP), complementario a HLS
            dash on;
            dash_path /tmp/dash/live; # Directorio de los segmentos DASH
            dash_fragment 3s;
            dash_playlist_length 12s;
        }

        # Aplicación opcional de retransmisión VOD; Nginx puede servir los archivos aunque no es un servidor VOD completo
        # application vod {
             play /tmp/vod/files; # Ruta a los archivos VOD dentro del contenedor
        # }
    }
}


# Bloque http
# Servidor HTTP estándar de nginx. Sirve el frontend, los segmentos HLS/DASH
# y los endpoints de monitoreo (/nginx_status, /stat).
http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    access_log /dev/stdout;

    # Servicio de archivos HLS y DASH
    server {
        listen 80;
        server_name  localhost;

        location / {
                    root /usr/share/nginx/html; # Directorio raíz desde el que sirve Nginx
                    index index.html index.htm; # Ficheros buscados por defecto
                }

        # Ruta para HLS
        location /live {
            # Tipo MIME para HLS
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp/hls; # Misma ruta definida en rtmp -> hls_path
            add_header 'Access-Control-Allow-Origin' '*'; # Habilita CORS
        }

        # Ruta para DASH
        location /dash {
            # Tipo MIME para DASH
            types {
                application/dash+xml mpd;
            }
            root /tmp/dash; # Misma ruta definida en rtmp -> dash_path
            add_header 'Access-Control-Allow-Origin' '*'; # Habilita CORS
        }

        #  Grabaciones VOD
        # Sirve los ficheros .ts de grabación: descarga directa y, a la vez, el
        # único segmento que referencia el playlist .m3u8 VOD que reproduce hls.js.
        # Accept-Ranges habilita peticiones range (reanudar descargas y seek).
        location /recordings/ {
            alias /recordings/;
            autoindex off;                 # no exponer el listado de directorios
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            # nginx ya añade Accept-Ranges: bytes para ficheros estáticos (permite seek)
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "private, max-age=3600"; # las grabaciones no cambian
        }

        #  API de metadatos de grabaciones
        # Proxy al servicio recordings-api (aiohttp):
        #   GET /api/recordings              → { dates: [{date, count}] }
        #   GET /api/recordings/{AAAA-MM-DD} → { files: [{name, display_time, size_mb, url, download_url}] }
        #   GET /api/recordings/{fecha}/{fichero}/playlist.m3u8 → playlist HLS VOD
        location /api/recordings {
            proxy_pass http://recordings-api:8081; # Service en K8s / nombre de servicio en Compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Servicio opcional de archivos VOD desde el contenedor
        # location /vod {
        #     alias /ruta/a/los/archivos/vod; # Ruta a los archivos VOD dentro del contenedor
        #     autoindex on; # Listado de archivos en el navegador
        #     add_header 'Access-Control-Allow-Origin' '*';
        # }

        # Endpoint de monitorización de Nginx
        location /nginx_status {
                    stub_status on;
                    access_log off; # Sin registro de accesos a esta URL de monitorización
                    allow 127.0.0.1; # Acceso únicamente desde localhost
                    allow 172.17.0.1; # IP interna del host Docker para pruebas externas

                    deny all;        # Denegación al resto de orígenes
                    #allow all;

                    # Acceso desde la red interna de Docker o desde la subred de monitorización
                    allow 172.0.0.0/8; # Red interna de Docker
                    allow 192.168.0.0/16; # Subred de monitorización
                }

         # Estadísticas RTMP consumidas por rtmp-exporter
        location /stat {
                    rtmp_stat all;
                    rtmp_stat_stylesheet stat.xsl; # Hoja de estilo opcional para visualización
                    allow 127.0.0.1;
                    allow 172.0.0.0/8;    # Red interna de Docker
                    allow 192.168.0.0/16;
                    deny all;
               }
    }
}
